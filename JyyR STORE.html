<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JYYR STORE</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

body {
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:white;
  background:linear-gradient(270deg,#1a002f,#2c5364);
  background-size:400% 400%;
  animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.header{text-align:center;padding:15px;color:#00ffd5;}

.search{
  width:90%;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  border:none;
  display:block;
}

.banner{
  margin:15px;
  background:linear-gradient(45deg,#4e54c8,#8f94fb);
  padding:20px;
  border-radius:15px;
}

.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:15px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  padding:10px;
  text-align:center;
  position:relative;
}

.card img{width:100%;border-radius:10px;}

.badge{
  position:absolute;
  top:5px;
  left:5px;
  background:red;
  padding:3px 8px;
  border-radius:10px;
  font-size:11px;
}

.desc{display:none;font-size:12px;}
.desc.show{display:block;}

.harga{
  background:#3498db;
  padding:5px;
  border-radius:10px;
}

.qty{
  display:flex;
  justify-content:center;
  gap:10px;
}

.qty button{
  background:#00ffd5;
  border:none;
  padding:5px;
  border-radius:5px;
}

.btn{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:10px;
}

.buy{background:#2ecc71;color:white;}

/* CART */
.cart{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.95);
  padding:15px;
  border-radius:20px 20px 0 0;
  transition:0.3s;
}

.cart.hide{transform:translateY(100%);}

.cart-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00ffd5;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}

.toast{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  background:#00ffd5;
  color:black;
  padding:10px;
  border-radius:20px;
  display:none;
}
</style>
</head>

<body>

<div class="header">🛒 JYYR STORE</div>

<input type="text" class="search" placeholder="Cari produk..." onkeyup="searchProduk(this.value)">

<div class="banner">Apps Premium 🔥</div>

<div class="container">

<!-- PRODUCT A -->
<div class="card" data-name="alight">
<div class="badge">🔥 HOT</div>
<img src="https://i.ibb.co.com/DDnvfpry/amprem.png">
<h3>ALIGHT MOTION</h3>

<p class="desc">✔ Premium 1 Tahun<br>✔ No Watermark</p>
<button onclick="toggleDesc(this)">Detail</button>

<p class="harga">Rp 10.000</p>

<div class="qty">
<button onclick="kurang('A')">-</button>
<span id="A">0</span>
<button onclick="tambah('A')">+</button>
</div>

<button class="btn buy" onclick="tambah('A')">Beli</button>
<button class="btn" onclick="toggleWishlist('ALIGHT MOTION')">❤️ Favorit</button>
</div>

<!-- PRODUCT B -->
<div class="card" data-name="capcut">
<div class="badge">⭐ BEST SELLER</div>
<img src="https://i.ibb.co.com/1tTwJKSc/Proyek-Baru-8-2-F337-C6.png">
<h3>CAPCUT</h3>

<p class="desc">✔ Pro Account<br>✔ No Watermark</p>
<button onclick="toggleDesc(this)">Detail</button>

<p class="harga">Rp 20.000</p>

<div class="qty">
<button onclick="kurang('B')">-</button>
<span id="B">0</span>
<button onclick="tambah('B')">+</button>
</div>

<button class="btn buy" onclick="tambah('B')">Beli</button>
<button class="btn" onclick="toggleWishlist('CAPCUT')">❤️ Favorit</button>
</div>

</div>

<!-- CART -->
<div class="cart hide">
<button onclick="toggleCart()">✖</button>

<input id="nama" placeholder="Nama kamu...">

<p id="list">Kosong</p>
<p>Total: Rp <span id="total">0</span></p>

<button class="btn buy" onclick="kirimWA()">Checkout</button>
<button class="btn" onclick="lihatWishlist()">❤️ Wishlist</button>

</div>

<div class="cart-toggle" onclick="toggleCart()">🛒</div>
<div class="toast" id="toast"></div>

<script>
let cart={A:0,B:0}, harga={A:10000,B:20000};
let wishlist=JSON.parse(localStorage.getItem("wishlist"))||[];

function toggleCart(){
 document.querySelector(".cart").classList.toggle("hide");
}

function tambah(id){
 cart[id]++;
 update();
}

function kurang(id){
 if(cart[id]>0){cart[id]--;update();}
}

function update(){
 let total=0,text="";
 ["A","B"].forEach(id=>{
  document.getElementById(id).innerText=cart[id];
  if(cart[id]>0){
   text+=(id=="A"?"ALIGHT":"CAPCUT")+" x"+cart[id]+"\n";
   total+=cart[id]*harga[id];
  }
 });
 document.getElementById("list").innerText=text||"Kosong";
 document.getElementById("total").innerText=total;
}

function toggleDesc(btn){
 btn.previousElementSibling.classList.toggle("show");
}

function searchProduk(k){
 k=k.toLowerCase();
 document.querySelectorAll(".card").forEach(c=>{
  c.style.display=c.dataset.name.includes(k)?"block":"none";
 });
}

function toast(t){
 let el=document.getElementById("toast");
 el.innerText=t;
 el.style.display="block";
 setTimeout(()=>el.style.display="none",2000);
}

function kirimWA(){
 let nama=document.getElementById("nama").value;
 if(!nama){toast("Isi nama!");return;}
 window.open("https://wa.me/6283890777348?text=Order dari "+nama);
}

// WISHLIST
function toggleWishlist(nama){
 if(wishlist.includes(nama)){
  wishlist=wishlist.filter(x=>x!==nama);
  toast("❌ Dihapus");
 }else{
  wishlist.push(nama);
  toast("❤️ Ditambahkan");
 }
 localStorage.setItem("wishlist",JSON.stringify(wishlist));
}

function lihatWishlist(){
 alert(wishlist.join("\n")||"Kosong");
}
</script>

</body>
</html>
